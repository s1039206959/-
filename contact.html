<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>联系我们 | 广州有喜传媒有限公司</title>
    <meta name="description" content="通过邮箱、微信或表单联系 Youxi Media，获取企业出海增长方案。" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="logo" href="index.html"><span class="logo-mark">YX</span><span>Youxi Media</span></a>
        <button class="nav-toggle" aria-label="切换导航菜单">☰</button>
        <nav class="nav-menu" aria-label="主导航">
          <a href="index.html">首页</a>
          <a href="about.html">关于我们</a>
          <a href="services.html">服务介绍</a>
          <a href="cases.html">成功案例</a>
          <a class="active" href="contact.html">联系我们</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container">
          <p class="section-label">Contact</p>
          <h1>欢迎咨询企业出海与增长合作</h1>
          <p>请通过下方方式联系我们，我们将在 1-2 个工作日内回复。</p>
        </div>
      </section>

      <section class="section">
        <div class="container contact-layout">
          <div>
            <h2>联系方式</h2>
            <ul class="contact-list">
              <li><strong>邮箱：</strong><a href="mailto:biz@youximedia.com">biz@youximedia.com</a></li>
              <li><strong>微信：</strong>s1039206959</li>
            </ul>
            <p class="contact-note">表单为静态站点方案：提交后自动唤起邮件客户端，不涉及后端与密钥暴露。</p>

            <div class="stats">
              <article><h3>欧美</h3><p>品牌化与渠道协同增长</p></article>
              <article><h3>中东</h3><p>区域化内容与分销策略</p></article>
              <article><h3>东南亚</h3><p>快速测试与迭代转化模型</p></article>
            </div>
          </div>

          <form class="contact-form" data-mail-form novalidate>
            <label>姓名<input type="text" name="name" required placeholder="请输入您的姓名" /></label>
            <label>公司名称<input type="text" name="company" required placeholder="请输入公司名称" /></label>
            <label>联系方式<input type="text" name="contact" required placeholder="手机号 / 微信 / 邮箱" /></label>
            <label>咨询需求<textarea name="demand" rows="5" required placeholder="请简要描述您的出海目标与当前问题"></textarea></label>
            <button type="submit" class="btn btn-primary">提交咨询需求</button>
            <p class="form-hint" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-wrap">
        <p>© <span id="year"></span> 广州有喜传媒有限公司 · Youxi Media</p>
        <a href="index.html">返回首页</a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
